<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LDCE Campus Navigator — Tech Fest 2025</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--s1:rgba(10,14,26,.97);--s2:rgba(14,20,38,.92);
  --b1:rgba(80,160,255,.16);--b2:rgba(80,160,255,.3);
  --cyan:#38bdf8;--cyan2:#00e5ff;--green:#4ade80;--amber:#fbbf24;
  --orange:#f97316;--rose:#f87171;--purple:#a78bfa;
  --t1:#f0f6ff;--t2:#94a3b8;--t3:#3d5068;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--t1);touch-action:none}
#cv{display:block;width:100vw;height:100vh;cursor:grab}
#cv:active{cursor:grabbing}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:300;height:50px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:rgba(7,9,15,.96);
  border-bottom:1px solid var(--b1);backdrop-filter:blur(24px)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-logo{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:conic-gradient(var(--cyan2),var(--amber),var(--orange),var(--cyan2));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 14px rgba(0,229,255,.35);animation:logoSpin 12s linear infinite}
@keyframes logoSpin{to{transform:rotate(360deg)}}
.hdr-logo-inner{width:28px;height:28px;border-radius:50%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:15px}
.hdr-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--cyan2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:9px;color:var(--t3);letter-spacing:1px;margin-top:1px;display:none}
@media(min-width:600px){.hdr-sub{display:block}.hdr-title{font-size:22px}}
.hdr-r{display:flex;gap:5px}
.badge{padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono';font-size:9px;
  letter-spacing:.5px;border:1px solid;white-space:nowrap}
.b-cyan{border-color:rgba(56,189,248,.4);color:var(--cyan);background:rgba(56,189,248,.08)}
.b-amber{border-color:rgba(251,191,36,.4);color:var(--amber);background:rgba(251,191,36,.08)}

/* ── SEARCH ── */
#srch-wrap{position:fixed;top:58px;left:50%;transform:translateX(-50%);
  z-index:280;width:min(400px,calc(100vw - 24px))}
.srch-box{display:flex;align-items:center;gap:8px;background:var(--s1);
  border:1px solid var(--b2);border-radius:13px;padding:9px 14px;
  backdrop-filter:blur(24px);box-shadow:0 4px 24px rgba(0,0,0,.5);
  transition:border-color .2s,box-shadow .2s}
.srch-box:focus-within{border-color:rgba(0,229,255,.5);
  box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0 3px rgba(0,229,255,.1)}
#si{flex:1;background:none;border:none;outline:none;
  font-family:'Space Grotesk';font-size:14px;color:var(--t1);min-width:0}
#si::placeholder{color:var(--t3)}
#sc{color:var(--t3);font-size:20px;cursor:pointer;display:none;line-height:1;padding:0 2px;flex-shrink:0}
#sr{background:var(--s1);border:1px solid var(--b1);border-radius:13px;
  margin-top:6px;display:none;max-height:min(280px,42vh);overflow-y:auto;
  backdrop-filter:blur(24px);box-shadow:0 8px 32px rgba(0,0,0,.6)}
.sri{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(80,160,255,.06);transition:background .15s}
.sri:last-child{border-bottom:none}
.sri:hover,.sri:active{background:rgba(56,189,248,.08)}
.sri-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sri-name{font-size:13px;font-weight:500}
.sri-meta{font-size:10px;color:var(--t3);margin-left:auto;font-family:'JetBrains Mono';white-space:nowrap}

/* ── NAV PANEL ── */
#nav{position:fixed;z-index:260;background:var(--s1);backdrop-filter:blur(24px);
  border:1px solid var(--b1);overflow:hidden}
/* MOBILE: bottom sheet */
@media(max-width:699px){
  #nav{bottom:0;left:0;right:0;border-radius:22px 22px 0 0;border-bottom:none;
    max-height:85vh;overflow-y:auto;
    transform:translateY(calc(100% - 64px));
    transition:transform .38s cubic-bezier(.32,0,.67,0);
    box-shadow:0 -12px 48px rgba(0,0,0,.6)}
  #nav.open{transform:translateY(0)}
  #nav.peek{transform:translateY(calc(100% - 112px))}
  #nav-handle{padding:12px 16px 0;cursor:pointer}
  .handle-bar{width:38px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 10px}
  .peek-row{display:flex;align-items:center;gap:8px;padding-bottom:10px}
}
@media(min-width:700px){
  #nav{top:58px;left:14px;width:288px;border-radius:16px;
    max-height:calc(100vh - 78px);overflow-y:auto;
    box-shadow:0 8px 40px rgba(0,0,0,.5)}
  #nav-handle{display:none}
}
.peek-dot{width:10px;height:10px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);flex-shrink:0;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.65)}}
.peek-txt{font-size:12px;color:var(--t2);flex:1;font-weight:500}
.peek-arr{font-size:18px;color:var(--cyan);transition:transform .3s}
#nav.open .peek-arr{transform:rotate(180deg)}

.nav-body{padding:0 16px 22px}
.nav-sec{font-family:'JetBrains Mono';font-size:9px;font-weight:700;
  letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;
  margin:14px 0 10px;display:flex;align-items:center;gap:6px}
.nav-sec::before{content:'';width:3px;height:11px;background:var(--cyan2);
  border-radius:2px;display:inline-block}

.sel-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.sel-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;border:1px solid}
.sel-ic.from{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:var(--green)}
.sel-ic.to{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.3);color:var(--orange)}
select.ns{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--b1);
  border-radius:10px;color:var(--t1);font-family:'Space Grotesk';font-size:13px;
  padding:9px 10px;outline:none;cursor:pointer;width:100%;
  -webkit-appearance:none;appearance:none}
select.ns option{background:#0a0e1a;color:var(--t1)}
select.ns:focus{border-color:var(--b2)}
.swap-row{text-align:center;margin:-1px 0}
.swap-btn{background:none;border:none;color:var(--t3);font-size:22px;
  cursor:pointer;padding:2px 8px;transition:color .2s;line-height:1}
.swap-btn:hover,.swap-btn:active{color:var(--cyan)}

#go-btn{width:100%;padding:13px;border-radius:12px;margin-top:10px;
  background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(56,189,248,.06));
  border:1px solid rgba(0,229,255,.4);color:var(--cyan2);
  font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
#go-btn:not(:disabled):hover,#go-btn:not(:disabled):active{
  background:rgba(0,229,255,.22);box-shadow:0 0 24px rgba(0,229,255,.2)}
#go-btn:disabled{opacity:.3;cursor:not-allowed}

/* Result card */
#rc{display:none;margin-top:12px;background:rgba(74,222,128,.06);
  border:1px solid rgba(74,222,128,.2);border-radius:13px;padding:13px 14px}
.rc-top{display:flex;gap:0;margin-bottom:10px;
  background:rgba(0,0,0,.25);border-radius:10px;overflow:hidden}
.rc-stat{flex:1;padding:10px 12px}
.rc-stat+.rc-stat{border-left:1px solid var(--b1)}
.rc-lbl{font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px;
  color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.rc-val{font-family:'Bebas Neue';font-size:28px;line-height:1;color:var(--green)}
.rc-unit{font-family:'JetBrains Mono';font-size:10px;color:var(--t3)}
.rc-val2{color:var(--amber)}

/* Direction steps */
.rc-steps-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;
  color:var(--t3);text-transform:uppercase;margin:10px 0 8px;
  border-top:1px solid var(--b1);padding-top:10px}
.step{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;flex-shrink:0;
  background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);
  color:var(--cyan);font-family:'JetBrains Mono';font-size:9px;
  display:flex;align-items:center;justify-content:center;margin-top:1px}
.step-body{}
.step-dir{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4}
.step-dir b{color:var(--cyan)}
.step-d{font-family:'JetBrains Mono';font-size:10px;color:var(--t3);margin-top:1px}

#clr-btn{width:100%;margin-top:10px;padding:9px;border-radius:10px;
  background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.25);
  color:var(--orange);font-family:'JetBrains Mono';font-size:10px;
  letter-spacing:.5px;cursor:pointer;transition:all .2s}
#clr-btn:active{background:rgba(249,115,22,.15)}

/* ── INFO CARD ── */
#ic{position:fixed;z-index:270;display:none}
@media(max-width:699px){
  #ic{bottom:0;left:0;right:0;border-radius:22px 22px 0 0}
  .ic-in{border-radius:22px 22px 0 0;padding:16px 16px 30px}
  .ic-in::before{content:'';display:block;width:36px;height:4px;
    background:var(--b2);border-radius:2px;margin:0 auto 14px}
}
@media(min-width:700px){
  #ic{top:58px;right:14px;width:272px}
  .ic-in{border-radius:16px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
}
.ic-in{background:var(--s1);border:1px solid var(--b2);
  backdrop-filter:blur(24px);position:relative}
#ic-x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.07);
  border:none;color:var(--t2);font-size:18px;cursor:pointer;width:28px;height:28px;
  border-radius:50%;display:flex;align-items:center;justify-content:center}
#ic-x:active{background:rgba(255,255,255,.14)}
#ic-num{font-family:'Bebas Neue';font-size:38px;line-height:1;margin-bottom:2px}
#ic-name{font-family:'Space Grotesk';font-size:14px;font-weight:700;
  margin-bottom:6px;padding-right:32px}
#ic-dist-pill{display:none;margin-bottom:9px}
.dist-pill{display:inline-flex;align-items:center;gap:5px;
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);
  border-radius:20px;padding:3px 11px;
  font-family:'JetBrains Mono';font-size:11px;color:var(--green)}
#ic-desc{font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:10px}
#ic-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.ic-tag{padding:3px 9px;border-radius:20px;font-size:9px;
  font-family:'JetBrains Mono';border:1px solid}
#ic-nav{width:100%;padding:12px;border-radius:11px;
  background:linear-gradient(135deg,rgba(0,229,255,.17),rgba(56,189,248,.05));
  border:1px solid rgba(0,229,255,.35);color:var(--cyan2);
  font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;
  cursor:pointer;transition:all .2s}
#ic-nav:active{background:rgba(0,229,255,.22)}

/* ── CONTROLS ── */
#ctrls{position:fixed;z-index:250;display:flex;gap:6px}
@media(max-width:699px){#ctrls{top:58px;right:10px;flex-direction:row}}
@media(min-width:700px){#ctrls{right:14px;bottom:56px;flex-direction:column}}
.cb{width:40px;height:40px;border-radius:11px;border:1px solid var(--b1);
  background:var(--s1);color:var(--cyan);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-size:17px;font-weight:600;
  backdrop-filter:blur(16px);transition:all .2s}
.cb:active{border-color:var(--cyan2);background:rgba(0,229,255,.12)}

/* ── COMPASS ── */
#cmp{position:fixed;z-index:250;width:40px;height:40px;border-radius:50%;
  background:var(--s1);border:1px solid var(--b1);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono';font-size:11px;font-weight:700;
  color:var(--cyan);transition:transform .4s ease}
@media(max-width:699px){#cmp{top:58px;left:10px}}
@media(min-width:700px){#cmp{right:228px;top:68px}}

/* ── LEGEND ── */
#legend{position:fixed;z-index:250;display:none}
@media(min-width:700px){
  #legend{display:block;right:14px;bottom:56px;width:148px}
}
.leg-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;
  padding:11px 13px;backdrop-filter:blur(16px)}
.leg-title{font-family:'JetBrains Mono';font-size:8px;letter-spacing:1.5px;
  color:var(--cyan);text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:5px}
.leg-title::before{content:'';width:3px;height:10px;background:var(--cyan2);
  border-radius:2px;display:inline-block}
.leg-item{display:flex;align-items:center;gap:7px;padding:3px 4px;
  cursor:pointer;border-radius:6px;transition:background .15s}
.leg-item:active{background:rgba(56,189,248,.08)}
.leg-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.leg-lbl{font-size:11px;font-weight:500;color:var(--t2)}

/* ── FILTER BAR ── */
#fbar{position:fixed;bottom:0;left:0;right:0;z-index:200;
  padding:7px 12px 9px;
  background:linear-gradient(0,rgba(7,9,15,.98) 55%,transparent);
  display:flex;justify-content:center;gap:5px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#fbar::-webkit-scrollbar{display:none}
.ft{padding:6px 12px;border-radius:20px;font-size:10px;
  font-family:'JetBrains Mono';letter-spacing:.5px;
  border:1px solid var(--b1);color:var(--t3);
  background:rgba(7,9,15,.8);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ft.on,.ft:active{border-color:var(--cyan2);color:var(--cyan2);background:rgba(0,229,255,.1)}

/* ── TOOLTIP ── */
#tip{position:fixed;pointer-events:none;z-index:400;
  background:rgba(7,9,15,.96);border:1px solid var(--b2);
  border-radius:9px;padding:6px 12px;font-size:12px;color:var(--cyan);
  font-family:'JetBrains Mono';white-space:nowrap;display:none;
  box-shadow:0 4px 18px rgba(0,0,0,.5)}
@media(max-width:699px){#tip{display:none!important}}

/* ── LOADING ── */
#ld{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.ld-ring{width:72px;height:72px;border-radius:50%;
  border:3px solid transparent;
  border-top-color:var(--cyan2);border-right-color:var(--amber);
  animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t1{font-family:'Bebas Neue';font-size:28px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--cyan2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ld-t2{font-family:'JetBrains Mono';font-size:10px;color:var(--t3);
  letter-spacing:2px;text-align:center;padding:0 30px}
.ld-bar{width:220px;height:3px;background:rgba(255,255,255,.06);
  border-radius:3px;overflow:hidden}
.ld-fill{height:100%;
  background:linear-gradient(90deg,var(--cyan2),var(--amber),var(--orange));
  border-radius:3px;animation:ldFill 2.4s ease-out forwards}
@keyframes ldFill{from{width:0}to{width:100%}}
.ld-tip{font-family:'JetBrains Mono';font-size:9px;color:var(--t3);letter-spacing:1px}

/* scanlines */
body::after{content:'';position:fixed;inset:0;z-index:998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.012) 2px,rgba(0,0,0,.012) 4px)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
</style>
</head>
<body>

<div id="ld">
  <div class="ld-ring"></div>
  <div class="ld-t1">LDCE NAVIGATOR</div>
  <div class="ld-t2">L.D. COLLEGE OF ENGINEERING<br>AHMEDABAD — 3D CAMPUS MAP</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-tip">LOADING CAMPUS ASSETS...</div>
</div>

<div id="hdr">
  <div class="hdr-l">
    <div class="hdr-logo"><div class="hdr-logo-inner">🏛️</div></div>
    <div>
      <div class="hdr-title">LDCE Navigator</div>
      <div class="hdr-sub">L.D. College of Engineering, Ahmedabad</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="badge b-cyan">⚡ Tech Fest 2025</div>
    <div class="badge b-amber">3D Map</div>
  </div>
</div>

<div id="srch-wrap">
  <div class="srch-box">
    <span style="color:var(--cyan);font-size:15px;flex-shrink:0">🔍</span>
    <input id="si" type="text" placeholder="Search block, dept, canteen...">
    <span id="sc">×</span>
  </div>
  <div id="sr"></div>
</div>

<div id="cmp">N</div>

<div id="ctrls">
  <button class="cb" id="c-rst">⌂</button>
  <button class="cb" id="c-zi">+</button>
  <button class="cb" id="c-zo">−</button>
  <button class="cb" id="c-top">⊞</button>
</div>

<div id="nav">
  <div id="nav-handle" onclick="toggleNav()">
    <div class="handle-bar"></div>
    <div class="peek-row">
      <div class="peek-dot"></div>
      <div class="peek-txt" id="ptxt">Tap to plan your route</div>
      <div class="peek-arr">▾</div>
    </div>
  </div>
  <div class="nav-body">
    <div class="nav-sec">Route Planner</div>
    <div class="sel-row">
      <div class="sel-ic from">📍</div>
      <select class="ns" id="from-s"><option value="">You are at...</option></select>
    </div>
    <div class="swap-row"><button class="swap-btn" id="swp">⇅</button></div>
    <div class="sel-row">
      <div class="sel-ic to">🏁</div>
      <select class="ns" id="to-s"><option value="">Go to...</option></select>
    </div>
    <button id="go-btn" disabled>→ SHOW ROUTE</button>
    <div id="rc">
      <div class="rc-top">
        <div class="rc-stat">
          <div class="rc-lbl">Distance</div>
          <div class="rc-val" id="rc-d">—</div>
          <div class="rc-unit">metres</div>
        </div>
        <div class="rc-stat">
          <div class="rc-lbl">Walking ETA</div>
          <div class="rc-val rc-val2" id="rc-w">—</div>
          <div class="rc-unit">minutes</div>
        </div>
      </div>
      <div class="rc-steps-title">Turn-by-Turn Directions</div>
      <div id="rc-steps"></div>
      <button id="clr-btn">✕ &nbsp;Clear Route</button>
    </div>
  </div>
</div>

<div id="ic">
  <div class="ic-in">
    <button id="ic-x">×</button>
    <div id="ic-num"></div>
    <div id="ic-name"></div>
    <div id="ic-dist-pill"></div>
    <div id="ic-desc"></div>
    <div id="ic-tags"></div>
    <button id="ic-nav">→ NAVIGATE HERE</button>
  </div>
</div>

<div id="legend">
  <div class="leg-card">
    <div class="leg-title">Categories</div>
    <div id="leg-list"></div>
  </div>
</div>

<div id="fbar">
  <button class="ft on" data-f="all">All</button>
  <button class="ft" data-f="academic">Academic</button>
  <button class="ft" data-f="admin">Admin</button>
  <button class="ft" data-f="hostel">Hostel</button>
  <button class="ft" data-f="sports">Sports</button>
  <button class="ft" data-f="facility">Facility</button>
</div>

<div id="tip"></div>
<canvas id="cv"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════

//

// ════════════════════════════════════════════════════════
//  ROAD-BASED SMART PATHFINDING
//  Every path snaps to road grid — NEVER goes through buildings
// ════════════════════════════════════════════════════════
function snap(v, arr){ return arr.reduce((p,c)=>Math.abs(c-v)<Math.abs(p-v)?c:p); }

function roadPath(fid, tid){
  const a = BLDGS.find(b=>b.id===fid), b = BLDGS.find(b=>b.id===tid);
  if(!a||!b) return [];
  const Y = .5;
  // snap each building to its nearest road corridor
  const rxa = snap(a.x, RX), rza = snap(a.z, RZ);
  const rxb = snap(b.x, RX), rzb = snap(b.z, RZ);

  const raw = [
    [a.x,   a.z  ],  // 0: start inside building
    [a.x,   rza  ],  // 1: go to nearest horiz road (move N/S)
    [rxa,   rza  ],  // 2: reach vert road intersection
    [rxa,   rzb  ],  // 3: travel along vert road to dest lat
    [rxb,   rzb  ],  // 4: cross to dest vert road
    [b.x,   rzb  ],  // 5: approach dest along horiz road
    [b.x,   b.z  ],  // 6: arrive at dest
  ];

  // Deduplicate consecutive identical points
  const pts = [new THREE.Vector3(raw[0][0],Y,raw[0][1])];
  for(let i=1; i<raw.length; i++){
    const prev = raw[i-1], cur = raw[i];
    if(Math.abs(cur[0]-prev[0])>.08 || Math.abs(cur[1]-prev[1])>.08)
      pts.push(new THREE.Vector3(cur[0],Y,cur[1]));
  }
  return pts;
}

function pLen(pts){ let d=0; for(let i=1;i<pts.length;i++) d+=pts[i].distanceTo(pts[i-1]); return d; }
function calcDist(a,b){ return Math.round(pLen(roadPath(a,b))*SCALE); }

function buildSteps(fid,tid){
  const a=BLDGS.find(b=>b.id===fid), b=BLDGS.find(b=>b.id===tid);
  if(!a||!b) return [];
  const pts=roadPath(fid,tid);
  const out=[{ dir:`Start at`, place:`${a.full}`, dist:'' }];
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x, dz=pts[i].z-pts[i-1].z;
    const seg=Math.round(pts[i].distanceTo(pts[i-1])*SCALE);
    if(seg<8) continue;
    let icon='', dir='';
    if(Math.abs(dz)>Math.abs(dx)){
      if(dz<0){ icon='↑'; dir='Head north'; }
      else     { icon='↓'; dir='Head south'; }
    } else {
      if(dx>0){ icon='→'; dir='Turn right (east)'; }
      else     { icon='←'; dir='Turn left (west)'; }
    }
    out.push({ dir:`${icon} ${dir}`, place:'', dist:`${seg} m` });
  }
  out.push({ dir:`Arrive at`, place:`${b.full}`, dist:'' });
  if(!b.flat && b.fl>1) out.push({ dir:`🏢 ${b.fl}-storey building`, place:'Check floor directory at entrance.', dist:'' });
  return out;
}

      new THREE.MeshStandardMaterial({
        color:b.clr, emissive:b.clr, emissiveIntensity:5,
        transparent:true, opacity:.9
      })
    );
    cap.position.y = bh+.08; cap.userData.glowCap = true; g.add(cap);
    const pl = new THREE.PointLight(b.clr, 4, 18); pl.position.y = bh+2; g.add(pl);
  }

  // ── LABEL SPRITE ──
  // Bigger, clearer labels with block number badge
  const LC = document.createElement('canvas');
  LC.width  = 340; LC.height = 96;
  const ctx = LC.getContext('2d');

  // Background panel
  ctx.fillStyle = 'rgba(7,9,15,.94)';
  ctx.beginPath(); ctx.roundRect(3,3,334,90,12); ctx.fill();
  // Coloured left accent bar
  ctx.fillStyle = hex+'cc';
  ctx.beginPath(); ctx.roundRect(3,3,42,90,12); ctx.fill();
  // Border
  ctx.strokeStyle = hex; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(3,3,334,90,12); ctx.stroke();

  // Block number
  ctx.font = 'bold 22px Bebas Neue,monospace';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(b.num.length>3 ? b.num.substring(0,3) : b.num, 24, 57);

  // Name
  ctx.textAlign = 'left';
  ctx.font = 'bold 17px Space Grotesk,sans-serif';
  ctx.fillStyle = '#f0f6ff';
  ctx.fillText(b.lbl, 54, 32);

  // Full name (truncated)
  ctx.font = '11px Space Grotesk,sans-serif';
  ctx.fillStyle = 'rgba(148,163,184,.8)';
  const fullTxt = b.full.length>32 ? b.full.substring(0,32)+'…' : b.full;
  ctx.fillText(fullTxt, 54, 52);

  // Floor count
  if(!b.flat){
    ctx.font = '9px JetBrains Mono,monospace';
    ctx.fillStyle = hex+'99';
    ctx.fillText(b.fl + ' FL  ·  ' + CATS[b.cat]?.lbl, 54, 70);
  }

  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(LC),
    transparent:true, depthTest:false
  }));
  sp.scale.set(4.2, 1.2, 1);
  sp.position.y = bh + 1.5;
  sp.renderOrder = 999;
  g.add(sp);
  g.labelSprite = sp;

  g.position.set(b.x, 0, b.z);
  g.userData = { ...b, body, bh };
  bGrp.add(g);
  bMap[b.id] = g;
});
scene.add(bGrp);

// ════════════════════════════════════════════════════════
//  PATH RENDERING
// ════════════════════════════════════════════════════════
let pathObjs = [];
function clearPath(){
  pathObjs.forEach(o => scene.remove(o));
  pathObjs = [];
}

function drawPath(fid, tid){
  clearPath();
  const pts = roadPath(fid, tid);
  if(pts.length < 2) return;

  // Slightly elevated points
  const ePts = pts.map(p => new THREE.Vector3(p.x, p.y+.1, p.z));

  // Main glow line
  const geo = new THREE.BufferGeometry().setFromPoints(ePts);
  const ln = new THREE.Line(geo, new THREE.LineBasicMaterial({ color:0x00e5ff, linewidth:3 }));
  ln.renderOrder = 30; scene.add(ln); pathObjs.push(ln);

  // Soft halos
  [-0.28, 0.28].forEach(off => {
    const g2 = new THREE.BufferGeometry().setFromPoints(ePts.map(p=>new THREE.Vector3(p.x+off,p.y-.02,p.z+off)));
    const l2 = new THREE.Line(g2, new THREE.LineBasicMaterial({ color:0x00e5ff, transparent:true, opacity:.18 }));
    l2.renderOrder = 29; scene.add(l2); pathObjs.push(l2);
  });

  // Animated dots distributed along full path
  const total = pLen(ePts);
  const nDots = Math.max(7, Math.round(total/2.2));
  for(let i=0; i<=nDots; i++){
    let rem = (i/nDots)*total, p = ePts[0].clone();
    for(let j=1; j<ePts.length; j++){
      const seg = ePts[j].distanceTo(ePts[j-1]);
      if(rem <= seg){ p = ePts[j-1].clone().lerp(ePts[j], seg>0?rem/seg:0); break; }
      rem -= seg; p = ePts[j].clone();
    }
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(.23, 8, 8),
      new THREE.MeshStandardMaterial({ color:0x00e5ff, emissive:0x00e5ff, emissiveIntensity:5 })
    );
    dot.position.set(p.x, p.y+.15, p.z);
    dot.userData.pd  = true;
    dot.userData.off = i * .6;
    dot.userData.by  = p.y + .15;
    scene.add(dot); pathObjs.push(dot);
  }

  // Origin GREEN ring + pin
  const aB = BLDGS.find(b=>b.id===fid);
  const pin = new THREE.Mesh(
    new THREE.SphereGeometry(.5, 10, 10),
    new THREE.MeshStandardMaterial({ color:0x4ade80, emissive:0x4ade80, emissiveIntensity:5 })
  );
  pin.position.set(aB.x, .65, aB.z);
  scene.add(pin); pathObjs.push(pin);

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(.65, .9, 30),
    new THREE.MeshStandardMaterial({ color:0x4ade80, emissive:0x4ade80, emissiveIntensity:3, transparent:true, opacity:.6, side:THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI/2;
  ring.position.set(aB.x, .22, aB.z);
  ring.userData.pRing = true;
  scene.add(ring); pathObjs.push(ring);

  // Destination ORANGE flag
  const bB = BLDGS.find(b=>b.id===tid);
  const bh = bMap[tid] ? bMap[tid].userData.bh : 1;
  const pole = new THREE.Mesh(
    new THREE.BoxGeometry(.14, 1.8, .14),
    new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:1.8 })
  );
  pole.position.set(bB.x, bh+.95, bB.z);
  pole.userData.flagBase = bh; pole.userData.isPole = true;
  scene.add(pole); pathObjs.push(pole);

  const flag = new THREE.Mesh(
    new THREE.BoxGeometry(.85, .5, .06),
    new THREE.MeshStandardMaterial({ color:0xf97316, emissive:0xf97316, emissiveIntensity:3.5 })
  );
  flag.position.set(bB.x+.5, bh+1.55, bB.z);
  flag.userData.flagBase = bh; flag.userData.isFlag = true;
  scene.add(flag); pathObjs.push(flag);
}

// ════════════════════════════════════════════════════════
//  CAMERA CONTROLS
// ════════════════════════════════════════════════════════
let drag=false, pM={x:0,y:0};
let sph={th:.4, ph:.78, r:60};
let tgt=new THREE.Vector3(0, 0, 4);
let hov=null, selId=null;

function updateCam(){
  const x=sph.r*Math.sin(sph.ph)*Math.sin(sph.th);
  const y=sph.r*Math.cos(sph.ph);
  const z=sph.r*Math.sin(sph.ph)*Math.cos(sph.th);
  cam.position.set(tgt.x+x, y, tgt.z+z);
  cam.lookAt(tgt);
  // Compass
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const normTh = ((sph.th%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  document.getElementById('cmp').textContent = dirs[Math.round(normTh/(Math.PI/4))%8] || 'N';
}

cv.addEventListener('mousedown', e=>{ drag=true; pM={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  sph.th -= (e.clientX-pM.x)*.005;
  sph.ph  = Math.max(.18, Math.min(1.52, sph.ph+(e.clientY-pM.y)*.005));
  pM = {x:e.clientX,y:e.clientY};
  updateCam();
});
cv.addEventListener('wheel', e=>{
  sph.r = Math.max(10, Math.min(120, sph.r+e.deltaY*.065));
  updateCam();
},{ passive:true });

let pinchD=0;
cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===1){
    drag=true; pM={x:e.touches[0].clientX,y:e.touches[0].clientY};
  } else if(e.touches.length===2){
    drag=false;
    pinchD = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
},{ passive:false });
cv.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    sph.r = Math.max(10, Math.min(120, sph.r-(d-pinchD)*.1));
    pinchD=d; updateCam();
  } else if(drag && e.touches.length===1){
    sph.th -= (e.touches[0].clientX-pM.x)*.005;
    sph.ph  = Math.max(.18, Math.min(1.52, sph.ph+(e.touches[0].clientY-pM.y)*.005));
    pM = {x:e.touches[0].clientX,y:e.touches[0].clientY};
    updateCam();
  }
},{ passive:false });
cv.addEventListener('touchend', e=>{ if(e.touches.length===0) drag=false; },{ passive:true });

document.getElementById('c-rst').onclick=()=>{ sph={th:.4,ph:.78,r:60}; tgt.set(0,0,4); updateCam(); };
document.getElementById('c-zi' ).onclick=()=>{ sph.r=Math.max(10,  sph.r-8);  updateCam(); };
document.getElementById('c-zo' ).onclick=()=>{ sph.r=Math.min(120, sph.r+8);  updateCam(); };
document.getElementById('c-top').onclick=()=>{ sph.ph=.18; updateCam(); };

// ════════════════════════════════════════════════════════
//  RAYCASTING — tap/click to select buildings
// ════════════════════════════════════════════════════════
const ray=new THREE.Raycaster(), mPos=new THREE.Vector2();
const tip=document.getElementById('tip');

function allBodies(){
  const a=[];
  bGrp.children.forEach(g => g.children.forEach(c=>{
    if(c.isMesh && !c.material.transparent) a.push(c);
  }));
  return a;
}

cv.addEventListener('mousemove', e=>{
  if(drag) return;
  mPos.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mPos, cam);
  const hits = ray.intersectObjects(allBodies());
  if(hits.length && hits[0].object.parent.userData.id){
    cv.style.cursor = 'pointer';
    const b  = hits[0].object.parent.userData;
    const fs = document.getElementById('from-s').value;
    const dt = (fs && fs!==b.id) ? `  📍 ${calcDist(fs,b.id)}m` : '';
    tip.style.display = 'block';
    tip.style.left    = (e.clientX+15)+'px';
    tip.style.top     = (e.clientY -8)+'px';
    tip.textContent   = b.full + dt;
    hov = b.id;
  } else {
    cv.style.cursor = 'grab';
    tip.style.display = 'none';
    hov = null;
  }
});

cv.addEventListener('click', e=>{
  if(Math.abs(e.movementX||0)>6 || Math.abs(e.movementY||0)>6) return;
  mPos.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mPos, cam);
  const hits = ray.intersectObjects(allBodies());
  if(hits.length && hits[0].object.parent.userData.id)
    selectBuilding(hits[0].object.parent.userData.id);
});

// Touch tap
let touchStartPos={x:0,y:0};
cv.addEventListener('touchstart', e=>{ touchStartPos={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{ passive:true });
cv.addEventListener('touchend', e=>{
  if(e.changedTouches.length!==1 || drag) return;
  const t=e.changedTouches[0];
  if(Math.abs(t.clientX-touchStartPos.x)>12 || Math.abs(t.clientY-touchStartPos.y)>12) return;
  mPos.set((t.clientX/innerWidth)*2-1, -(t.clientY/innerHeight)*2+1);
  ray.setFromCamera(mPos, cam);
  const hits = ray.intersectObjects(allBodies());
  if(hits.length && hits[0].object.parent.userData.id)
    selectBuilding(hits[0].object.parent.userData.id);
},{ passive:true });

function selectBuilding(id){
  selId = id;
  const b = BLDGS.find(x=>x.id===id); if(!b) return;
  tgt.set(b.x, 0, b.z); sph.r=22; updateCam();

  const hex = '#'+b.clr.toString(16).padStart(6,'0');
  document.getElementById('ic-num').textContent  = b.num;
  document.getElementById('ic-num').style.color  = hex;
  document.getElementById('ic-name').textContent = b.full;
  document.getElementById('ic-name').style.color = hex;
  document.getElementById('ic-desc').textContent = b.desc;
  document.getElementById('ic-tags').innerHTML   = [
    b.cat && `<span class="ic-tag" style="color:${hex};border-color:${hex}55">${CATS[b.cat]?.lbl||b.cat}</span>`,
    !b.flat && b.fl && `<span class="ic-tag" style="color:var(--t3);border-color:var(--b1)">${b.fl} Floors</span>`,
  ].filter(Boolean).join('');

  const fs  = document.getElementById('from-s').value;
  const dp  = document.getElementById('ic-dist-pill');
  if(fs && fs!==id){
    const d=calcDist(fs,id), w=Math.max(1,Math.round(d/80));
    dp.innerHTML = `<div class="dist-pill">📍 ${d}m away · ~${w} min walk</div>`;
    dp.style.display='block';
  } else dp.style.display='none';

  document.getElementById('ic').style.display='block';

  // Highlight selected
  bGrp.children.forEach(g=>{
    const m=g.userData.body;
    if(m) m.material.emissiveIntensity = g.userData.id===id ? 2.8 : .65;
  });

  document.getElementById('to-s').value = id;
  checkGo();

  // Close nav panel on mobile
  if(window.innerWidth<700){
    document.getElementById('nav').classList.remove('open');
    document.getElementById('nav').classList.remove('peek');
  }
}

document.getElementById('ic-x').onclick=()=>{
  document.getElementById('ic').style.display='none'; selId=null;
  bGrp.children.forEach(g=>{ if(g.userData.body) g.userData.body.material.emissiveIntensity=.65; });
};

// ════════════════════════════════════════════════════════
//  NAV PANEL
// ════════════════════════════════════════════════════════
let navOpen=false;
function toggleNav(){
  if(window.innerWidth>=700) return;
  navOpen=!navOpen;
  const p=document.getElementById('nav');
  p.classList.toggle('open',navOpen);
  p.classList.remove('peek');
}

// Populate selects
const opts = BLDGS.map(b=>`<option value="${b.id}">${b.full}</option>`).join('');
document.getElementById('from-s').innerHTML='<option value="">You are at...</option>'+opts;
document.getElementById('to-s'  ).innerHTML='<option value="">Go to...</option>'+opts;

function checkGo(){
  const f=document.getElementById('from-s').value, t=document.getElementById('to-s').value;
  document.getElementById('go-btn').disabled=!(f&&t&&f!==t);
  if(f){ const b=BLDGS.find(x=>x.id===f); if(b) document.getElementById('ptxt').textContent='From: '+b.lbl; }
}
document.getElementById('from-s').addEventListener('change', checkGo);
document.getElementById('to-s'  ).addEventListener('change', checkGo);
document.getElementById('swp').onclick=()=>{
  const f=document.getElementById('from-s'), t=document.getElementById('to-s'), tmp=f.value;
  f.value=t.value; t.value=tmp; checkGo();
};

document.getElementById('go-btn').onclick=()=>{
  const fid=document.getElementById('from-s').value, tid=document.getElementById('to-s').value;
  if(!fid||!tid||fid===tid) return;
  const a=BLDGS.find(b=>b.id===fid), b=BLDGS.find(b=>b.id===tid);
  const d=calcDist(fid,tid), w=Math.max(1,Math.round(d/80));
  drawPath(fid,tid);
  document.getElementById('rc-d').textContent=d;
  document.getElementById('rc-w').textContent=w;
  // Build step directions HTML
  const stepsHTML = buildSteps(fid,tid).map((s,i)=>`
    <div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-body">
        <div class="step-dir">${s.dir} ${s.place?`<b>${s.place}</b>`:''}</div>
        ${s.dist?`<div class="step-d">${s.dist}</div>`:''}
      </div>
    </div>`).join('');
  document.getElementById('rc-steps').innerHTML=stepsHTML;
  document.getElementById('rc').style.display='block';
  // Zoom to show full route
  tgt.set((a.x+b.x)/2, 0, (a.z+b.z)/2);
  sph.r = Math.max(38, Math.hypot(a.x-b.x, a.z-b.z)*2.6+22);
  updateCam();
  document.getElementById('ic').style.display='none';
  // On mobile: show peek card with result
  if(window.innerWidth<700){
    const n=document.getElementById('nav');
    n.classList.remove('open');
    n.classList.add('peek');
    navOpen=false;
  }
};

document.getElementById('clr-btn').onclick=()=>{
  clearPath();
  document.getElementById('rc').style.display='none';
  const n=document.getElementById('nav');
  n.classList.remove('peek');
};

document.getElementById('ic-nav').onclick=()=>{
  if(!selId) return;
  document.getElementById('to-s').value=selId; checkGo();
  document.getElementById('ic').style.display='none';
  const fs=document.getElementById('from-s').value;
  if(fs){
    document.getElementById('go-btn').click();
  } else {
    toggleNav(); // open nav to pick "from"
    const sel=document.getElementById('from-s');
    sel.style.borderColor='rgba(249,115,22,.8)';
    sel.style.boxShadow='0 0 14px rgba(249,115,22,.4)';
    setTimeout(()=>{ sel.style.borderColor=''; sel.style.boxShadow=''; },2800);
  }
};

// ════════════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════════════
const siEl=document.getElementById('si'), srEl=document.getElementById('sr'), scEl=document.getElementById('sc');
siEl.addEventListener('input',()=>{
  const q=siEl.value.toLowerCase().trim();
  scEl.style.display=q?'block':'none';
  if(!q){ srEl.style.display='none'; return; }
  const ms=BLDGS.filter(b=>
    b.lbl.toLowerCase().includes(q) ||
    b.full.toLowerCase().includes(q) ||
    b.num.toLowerCase().includes(q)  ||
    b.desc.toLowerCase().includes(q) ||
    b.cat.toLowerCase().includes(q)
  );
  if(!ms.length){ srEl.style.display='none'; return; }
  const fs=document.getElementById('from-s').value;
  srEl.style.display='block';
  srEl.innerHTML=ms.slice(0,9).map(b=>{
    const hex='#'+b.clr.toString(16).padStart(6,'0');
    const d=fs&&fs!==b.id?` · 📍${calcDist(fs,b.id)}m`:'';
    return`<div class="sri" onclick="pickSR('${b.id}')">
      <div class="sri-dot" style="background:${hex}"></div>
      <div class="sri-name">${b.full}</div>
      <div class="sri-meta">${CATS[b.cat]?.lbl||b.cat}${d}</div>
    </div>`;
  }).join('');
});
scEl.onclick=()=>{ siEl.value=''; scEl.style.display='none'; srEl.style.display='none'; };
siEl.addEventListener('keydown',e=>{ if(e.key==='Escape'){ siEl.value=''; scEl.style.display='none'; srEl.style.display='none'; } });
document.addEventListener('click',e=>{ if(!e.target.closest('#srch-wrap')) srEl.style.display='none'; });
window.pickSR=(id)=>{ siEl.value=''; scEl.style.display='none'; srEl.style.display='none'; selectBuilding(id); };

// ════════════════════════════════════════════════════════
//  LEGEND & FILTER
// ════════════════════════════════════════════════════════
const legList=document.getElementById('leg-list');
Object.entries(CATS).forEach(([k,c])=>{
  const d=document.createElement('div'); d.className='leg-item';
  d.innerHTML=`<div class="leg-dot" style="background:${c.clr}"></div><div class="leg-lbl">${c.lbl}</div>`;
  d.onclick=()=>{ document.querySelectorAll('.ft').forEach(b=>b.classList.remove('on')); applyFilter(k); };
  legList.appendChild(d);
});
function applyFilter(f){ bGrp.children.forEach(g=>{ g.visible = f==='all' || g.userData.cat===f; }); }
document.querySelectorAll('.ft').forEach(btn=>{
  btn.onclick=()=>{ document.querySelectorAll('.ft').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); applyFilter(btn.dataset.f); };
});

// ════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════
let T=0;
function animate(){
  requestAnimationFrame(animate); T+=.016;
  // Ambient light pulse
  nL1.intensity = 2.5 + Math.sin(T*1.4)*.9;
  nL2.intensity = 1.8 + Math.cos(T*1.1)*.7;

  bGrp.children.forEach(g=>{
    // Landmark glow
    if(g.userData.lmk){
      const cap=g.children.find(c=>c.userData.glowCap);
      if(cap) cap.material.emissiveIntensity = 3.5 + Math.sin(T*2.2)*1.8;
    }
    // Hover lift
    const isHov = g.userData.id===hov && !g.userData.flat;
    g.scale.y = THREE.MathUtils.lerp(g.scale.y, isHov?1.12:1, .12);
    // Label fade by distance
    if(g.labelSprite){
      const d=cam.position.distanceTo(g.position);
      g.labelSprite.material.opacity = d<30 ? 1 : Math.max(0, 1-(d-30)/18);
    }
  });

  // Animate path dots
  pathObjs.forEach(o=>{
    if(o.userData.pd)     o.position.y = o.userData.by + Math.sin(T*4+o.userData.off)*.2;
    if(o.userData.pRing)  o.material.opacity = .28 + Math.sin(T*2.8)*.26;
    if(o.userData.isPole||o.userData.isFlag){
      const bh=o.userData.flagBase;
      o.position.y = bh + (o.userData.isPole?.95:1.55) + Math.sin(T*2.5)*.09;
    }
  });

  ren.render(scene, cam);
}

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
  ren.setSize(innerWidth,innerHeight);
});

updateCam();
animate();

// Dismiss loading screen
setTimeout(()=>{
  const l=document.getElementById('ld');
  l.style.transition='opacity 1s';
  l.style.opacity='0';
  setTimeout(()=>l.style.display='none', 1000);
}, 2500);
</script>
